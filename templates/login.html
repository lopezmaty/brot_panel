{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — Brot Panel</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{% static 'css/base.css' %}">
  <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body class="login-body">

  <div class="login-card">
    <img src="{% static 'img/logo.png' %}" alt="Brot Panes" class="login-logo">

    {% if error %}
      <p class="login-error">Usuario o contraseña incorrectos.</p>
    {% endif %}

    <form method="post" class="login-form">
      {% csrf_token %}
      <label for="username">Usuario</label>
      <input type="text" id="username" name="username" required autofocus>

      <label for="password">Contraseña</label>
      <input type="password" id="password" name="password" required>

      <button type="submit" class="btn-primary login-btn">Ingresar</button>
    </form>
  </div>

</body>
</html>
