{% extends 'base.html' %}
{% load static %}

{% block body_class %}no-sidebar{% endblock %}

{% block content %}

{% csrf_token %}

<span class="page-eyebrow">Administración</span>
<h1 class="page-title">
  {% if producto %}Editar producto{% else %}Nuevo producto{% endif %}
</h1>

<div class="card">
  <form id="formProducto" data-producto-id="{% if producto %}{{ producto.id }}{% endif %}">
    <div class="form-grid">
      <div>
        <label>Nombre</label>
        <input type="text" id="inputNombre" value="{% if producto %}{{ producto.nombre }}{% endif %}" required>
      </div>
      <div>
        <label>Variedad</label>
        <select id="inputVariedad" required>
          {% for v in variedad %}
          <option value="{{ v.id }}" {% if producto.variedad.id == v.id %}selected{% endif %}>{{ v.nombre }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label>Tamaño</label>
        <select id="inputTamaño" required>
          {% for t in tamaño %}
          <option value="{{ t.id }}" {% if producto.tamaño.id == t.id %}selected{% endif %}>{{ t.nombre }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label>Familia</label>
        <select id="inputFamilia" required>
          {% for f in familia %}
          <option value="{{ f.id }}" {% if producto.familia.id == f.id %}selected{% endif %}>{{ f.nombre }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label>Unidades por paquete</label>
        <input type="number" id="inputUnidadesPaquete" value="{% if producto %}{{ producto.unidades_paquete }}{% endif %}" required>
      </div>
      <div>
        <label>Tipo de medida</label>
        <select id="inputTipoMedida" required>
          <option value="diametro" {% if producto.tipo_medida == 'diametro' %}selected{% endif %}>Diámetro</option>
          <option value="largo_ancho" {% if producto.tipo_medida == 'largo_ancho' %}selected{% endif %}>Largo x Ancho</option>
          <option value="largo_ancho_alto" {% if producto.tipo_medida == 'largo_ancho_alto' %}selected{% endif %}>Largo x Ancho x Alto</option>
        </select>
      </div>
      <div>
        <label id="labelMedida1">Medida 1</label>
        <input type="number" step="0.1" id="inputMedida1" value="{% if producto %}{{ producto.medida_1 }}{% endif %}">
      </div>
      <div>
        <label id="labelMedida2">Medida 2</label>
        <input type="number" step="0.1" id="inputMedida2" value="{% if producto %}{{ producto.medida_2 }}{% endif %}">
      </div>
      <div>
        <label id="labelMedida3">Medida 3</label>
        <input type="number" step="0.1" id="inputMedida3" value="{% if producto %}{{ producto.medida_3 }}{% endif %}">
      </div>
    </div>

    <div class="form-checkboxes">
      <label class="checkbox-label">
        <input type="checkbox" id="inputActivo" {% if producto.activo|default:True %}checked{% endif %}>
        Producto activo
      </label>
    </div>

    <div class="form-actions">
      <a href="{% url 'producto' %}" class="btn-secondary">Cancelar</a>
      <button type="submit" class="btn-primary">
        {% if producto %}Guardar cambios{% else %}Crear producto{% endif %}
      </button>
    </div>
  </form>
</div>

{% endblock %}

{% block extra_js %}
<script src="{% static 'js/producto_detalle.js' %}"></script>
{% endblock %}
